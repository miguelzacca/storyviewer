<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InstaStories View</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="background-elements">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>
  
  <div class="container">
    <header class="glass-header">
      <h1>Stories Viewer</h1>
      <p>Enter an Instagram username to anonymously view their current stories.</p>
    </header>

    <main>
      <form id="search-form" class="search-form">
        <div class="input-group">
          <span class="at-symbol">@</span>
          <input type="text" id="username" placeholder="username" required autocomplete="off" spellcheck="false">
          <button type="submit" id="submit-btn">
            <span class="btn-text">View</span>
            <span class="loader" style="display: none;"></span>
          </button>
        </div>
      </form>

      <div id="error-message" class="error-message"></div>

      <div id="stories-grid" class="stories-grid">
        <!-- Stories will be injected here -->
      </div>
    </main>
  </div>

  <script src="/app.js"></script>
</body>
</html>
